services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BACKEND_PORT: ${BACKEND_PORT}
    container_name: ai_blog_backend_dev
    command: sh -c "npm install --include=dev && npm run dev"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=${BACKEND_PORT}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_PORT: ${FRONTEND_PORT}
        NEXT_PUBLIC_SITE_URL: ${COMPOSE_NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_URL: ${COMPOSE_NEXT_PUBLIC_API_URL}
    container_name: ai_blog_frontend_dev
    command: sh -c "if [ ! -d node_modules/next ]; then npm install --include=dev; fi && npm run dev -- --hostname 0.0.0.0 --port ${FRONTEND_PORT}"
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
      - PORT=${FRONTEND_PORT}
      - INTERNAL_API_URL=http://backend:${BACKEND_PORT}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_next_cache:/app/.next

volumes:
  frontend_next_cache:
